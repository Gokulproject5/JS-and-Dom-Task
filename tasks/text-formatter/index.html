<body class="bg-[url(/task-manager/assets/bg-1.jpg)] bg-cover bg-no-repeat ">
    <header>
        <nav
            class="border-b-4 border-gray-400 bg-linear-to-r  from-purple-500  to-white  text-white flex justify-between items-center">
            <div class=" px-4 ">
                <h1
                    class="text-2xl  bg-linear-to-r  from-gray-200 from-50% to-55%   to-white  text-transparent bg-clip-text  font-bold  ">
                    <a href="/index.html">Gokul</a>
                </h1>
            </div>
            <div>
                <h1>TexT Formatter</h1>
            </div>
            <div class="text-sm p-4 space-x-3 text-purple-900 ">

            </div>
        </nav>

    <main>
        <section >
            <div class="mx-auto flex flex-col items-center container my-10">
                  <div id="alertContainer">

                </div>
              <div class="relative">
               <div class=" absolute top-15 left-30 z-0  ">
                   <video  src="/task-manager/assets/bg-video.mp4 " autoplay loop class="w-50 rounded-lg" ></video>
                   
                </div>  
                <div class="relative mt-30 ">
                     
                    <textarea id="textBox" rows="10" value="gokul" cols="50"
                        class="bg-gray-400 focus:outline-orange-400  focus:border-none focus:outline-2  border-2 border-blue-500 rounded placeholder:text-sm px-2"
                        placeholder="enter your magical words" name="" id=""></textarea>
                    <div class="absolute top-1 right-0">
                        <span onclick="copyText()" class="bg-orange-400 py-1 px-2 text-white rounded">copy</span>
                    </div>
                </div>
                <div>
                    <button data-action="generateText"
                        class="bg-orange-300 px-2 py-1 rounded-sm hover:bg-orange-400">Text Generator</button>
                    <button data-action="upperCase"
                        class="bg-green-400 px-2 py-1 rounded-sm hover:bg-green-500">UpperCase</button>
                    <button data-action="lowerCase"
                        class="bg-yellow-300 px-2 py-1 rounded-sm hover:bg-yellow-400">LowerCase</button>
                    <button data-action="clearText" class="bg-red-300 px-2 py-1 rounded-sm hover:bg-red-400">Clear
                        Text</button>
                </div>
            </div>
            </div>
        </section>
    </main>

    <!-- script -->

        }

        // Copy function
        function copyText() {
            let textToCopy = textBoxEl.value;
            navigator.clipboard.writeText(textToCopy);
            let copySpanEl = document.querySelector("span");
            copySpanEl.innerText = `Copied `;
            alertPopup("Text Copied", `copy`);
            setTimeout(() => {
                copySpanEl.innerText = `Copy `

            }, 2000);
        }

            console.log(btnel)

                if (btnel.dataset.action == "generateText") {
                    generateText();
                }
                else if (btnel.dataset.action == "upperCase") {
                    upperCase();
                } else if (btnel.dataset.action == "lowerCase") {
                    lowerCase();
                } else if (btnel.dataset.action == "clearText") {

            }

            const upperCase = () => {
                let textBox = textBoxEl.value.toUpperCase();
                textBoxEl.value = textBox;
                console.log(textBox);
                alertPopup("Text convert into upperCase", `upper`);
            }

            const lowerCase = () => {
                let textBox = textBoxEl.value.toLowerCase();
                textBoxEl.value = textBox
                console.log(textBox);
                alertPopup("Text convert into lowerCase", `lower`);
            }

            const clearText = () => {
                textBoxEl.value = "";
                console.log(textBox);
                alertPopup("Clear ALL Text", `clear`);
            }
        })


        // alert function 
        function alertPopup(message, color) {
            let alertText = document.createElement("p");
            alertText.className = `p-2 text-white w-120 rounded  m-2 transition-all duration-300 ease-in-out delay-300`
            alertText.innerText = message;
            alertText.classList.add(`${alertColor[color]}`)
            alertContainer.append(alertText)
            setTimeout(() => {
                alertText.remove();
            }, 2000);
        }


    </script>
</body>

</html>
